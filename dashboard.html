<!DOCTYPE html>
<html>
<head>
    <title>Store Intelligence Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .cards {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            width: 150px;
        }

        .heatmap {
            margin-top: 30px;
        }

        .zone {
            display: inline-block;
            width: 100px;
            height: 100px;
            margin: 5px;
            background: blue;
            border-radius: 8px;
            line-height: 100px;
        }
    </style>
</head>
<body>

<h1>🏬 Store Dashboard</h1>

<div class="cards">
    <div class="card">
        <h3>Entries</h3>
        <p id="entries">0</p>
    </div>

    <div class="card">
        <h3>Visitors</h3>
        <p id="visitors">0</p>
    </div>

    <div class="card">
        <h3>Conversion</h3>
        <p id="conversion">0</p>
    </div>
</div>

<h2>🔥 Heatmap</h2>
<div class="heatmap" id="heatmap"></div>

<script>
const API = "https://store-intelligence-id.onrender.com";
const STORE = "STORE_001";

async function loadData() {
    // METRICS
    const m = await fetch(`${API}/stores/${STORE}/metrics`).then(r => r.json());

    document.getElementById("entries").innerText = m.entries;
    document.getElementById("visitors").innerText = m.unique_visitors;
    document.getElementById("conversion").innerText = m.conversion_rate;

    // HEATMAP
    const heat = await fetch(`${API}/stores/${STORE}/heatmap`).then(r => r.json());

    const container = document.getElementById("heatmap");
    container.innerHTML = "";

    for (let zone in heat) {
        let intensity = heat[zone];

        let div = document.createElement("div");
        div.className = "zone";
        div.innerText = zone;

        // color intensity
        div.style.background = `rgba(255,0,0,${Math.min(intensity/10,1)})`;

        container.appendChild(div);
    }
}

// auto refresh
setInterval(loadData, 3000);
loadData();
</script>

</body>
</html>
